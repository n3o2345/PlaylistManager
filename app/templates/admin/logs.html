<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs — FastChannels</title>
  <style>
    html { font-size: 17px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      min-height: 100vh;
      min-height: 100dvh;
      height: 100dvh;
      overflow: hidden;
    }
    nav { background: var(--surface); padding: 1rem 2rem; display: flex; align-items: center; gap: 2rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    nav .version { margin-left: auto; color: var(--text-muted); font-size: 0.75rem; }
    nav h1 { display: flex; align-items: center; padding: 0; margin: 0; }
    nav a { color: var(--text-soft); text-decoration: none; font-size: 0.9rem; }
    nav a:hover, nav a.active { color: var(--text); }

    .toolbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.6rem 1.5rem; display: flex; align-items: center; gap: 1rem;
    }
    .toolbar label { font-size: 0.82rem; color: var(--text-soft); display: flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    .toolbar input[type=checkbox] { accent-color: var(--accent); }
    .btn {
      padding: 0.35rem 0.85rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
      border: none; font-weight: 500; background: var(--accent-strong); color: white; transition: background 0.15s;
    }
    .btn:hover { background: var(--accent-strong-hover); }
    .filter-input {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.8rem; width: 220px;
    }
    .filter-input:focus { outline: none; border-color: var(--accent); }
    .status { font-size: 0.78rem; color: var(--text-muted); margin-left: auto; }

    #log-container {
      overflow: auto; padding: 0.75rem 1.5rem;
      font-family: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace; font-size: 0.78rem; line-height: 1.55;
      height: 100%;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-x pan-y;
    }
    .line { white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; }
    .line-INFO    { color: var(--text-subtle); }
    .line-WARNING { color: var(--warning); }
    .line-ERROR   { color: var(--danger); }
    .line-CRITICAL{ color: var(--danger); font-weight: 700; }
    .line-DEBUG   { color: var(--text-dim); }
    .line-other   { color: var(--text-soft); }
    .line.hidden  { display: none; }
    @media (max-width: 760px) {
      html { font-size: 16px; }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        height: 100dvh;
        overflow: hidden;
      }
      nav { padding: 0.9rem 1rem; gap: 0.75rem 1rem; }
      nav h1 { width: 100%; }
      nav .version { margin-left: 0; width: 100%; order: 99; }
      .toolbar {
        padding: 0.75rem 1rem;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 0.75rem;
      }
      .toolbar label, .toolbar .btn {
        min-height: 2.25rem;
      }
      .toolbar label {
        width: calc(50% - 0.375rem);
      }
      .toolbar .btn {
        width: 100%;
      }
      .filter-input { width: 100%; }
      .status { margin-left: 0; width: 100%; }
      #log-container {
        min-height: 0;
        height: 100%;
        overflow: auto;
        -webkit-overflow-scrolling: touch;
        padding: 0.75rem 0.85rem 1.1rem;
        font-size: 0.72rem;
        line-height: 1.45;
      }
      .line {
        padding: 0.12rem 0;
        white-space: pre;
        word-break: normal;
        overflow-wrap: normal;
        min-width: max-content;
      }
    }
  </style>
  {% include 'admin/_theme_head.html' %}
</head>
<body>
  <nav>
    <h1><a href="/admin/" style="display:flex;align-items:center;text-decoration:none;"><img src="{{ url_for('static', filename='fastchannels_logo.svg') }}" alt="FastChannels" style="height:36px;width:auto;object-fit:contain;"></a></h1>
    <a href="/admin/">Dashboard</a>
    <a href="/admin/sources">Sources</a>
    <a href="/admin/channels">Channels</a>
    <a href="/admin/feeds">Feeds</a>
    <a href="/admin/settings">Settings</a>
    <a href="/admin/logs" class="active">Logs</a>
    <a href="/admin/help">Help</a>
    {% include 'admin/_theme_toggle.html' %}
    {% if update_status.update_available %}<span class="version" style="cursor:pointer" onclick="openUpdateModal()" title="Update available: v{{ update_status.latest_version }}">v{{ app_version }}<span class="update-pip"></span></span>{% else %}<a class="version" href="{{ update_status.latest_url or 'https://github.com/kineticman/FastChannelsv2' }}" target="_blank" rel="noopener noreferrer" title="View FastChannels on GitHub">v{{ app_version }}</a>{% endif %}
  </nav>

  <div class="toolbar">
    <button class="btn" onclick="refresh()">↺ Refresh</button>
    <label><input type="checkbox" id="auto-refresh" onchange="toggleAuto()"> Auto (5s)</label>
    <label><input type="checkbox" id="tail-mode" checked onchange="applyFilter()"> Tail</label>
    <input class="filter-input" id="filter" type="text" placeholder="Filter…" oninput="applyFilter()">
    <span class="status" id="status"></span>
  </div>

  <div id="log-container"></div>

  <script>
    const APP_TIME_ZONE = {{ app_timezone_name|tojson }};
    let _timer = null;
    let _lines = [];

    const LEVEL_RE = /\s+(INFO|WARNING|ERROR|CRITICAL|DEBUG)\s+/;

    function levelClass(line) {
      const m = line.match(LEVEL_RE);
      if (!m) return 'line-other';
      return 'line-' + m[1];
    }

    async function refresh() {
      const status = document.getElementById('status');
      status.textContent = 'Loading…';
      try {
        const r = await fetch('/api/logs?n=2500');
        const data = await r.json();
        _lines = data.lines;
        applyFilter();
        status.textContent = `${_lines.length} lines · ${new Date().toLocaleTimeString([], { timeZone: APP_TIME_ZONE, timeZoneName: 'short' })}`;
      } catch(e) {
        status.textContent = 'Error: ' + e.message;
      }
    }

    function applyFilter() {
      const query = document.getElementById('filter').value.toLowerCase();
      const tail  = document.getElementById('tail-mode').checked;
      const container = document.getElementById('log-container');

      container.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const line of _lines) {
        const div = document.createElement('div');
        div.className = 'line ' + levelClass(line);
        div.textContent = line.trimEnd();
        if (query && !line.toLowerCase().includes(query)) div.classList.add('hidden');
        frag.appendChild(div);
      }
      container.appendChild(frag);

      if (tail) container.scrollTop = container.scrollHeight;
    }

    function toggleAuto() {
      if (document.getElementById('auto-refresh').checked) {
        _timer = setInterval(refresh, 5000);
      } else {
        clearInterval(_timer);
        _timer = null;
      }
    }

    refresh();
  </script>
  <script src="{{ url_for('static', filename='js/admin_theme.js') }}"></script>
  {% include 'admin/_update_modal.html' %}
</body>
</html>
