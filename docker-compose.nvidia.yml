# docker-compose.nvidia.yml
# NVIDIA GPU (h264_nvenc encoder)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up -d
#
# Requirements:
#   - nvidia-container-toolkit installed and configured on the host
#   - On TrueNAS SCALE: select the NVIDIA GPU under Resources → GPU Passthrough,
#     OR run via the CLI with the override file as shown above.
#
# Why this works with jellyfin-ffmpeg:
#   Debian bookworm's stock ffmpeg is compiled WITHOUT --enable-nvenc, so
#   h264_nvenc never appears even when GPU passthrough is working.
#   jellyfin-ffmpeg ships a static build that includes h264_nvenc/vaapi/qsv.
#   The NVENC runtime (.so libs) are injected at container start by
#   nvidia-container-toolkit — nothing CUDA-version-specific is in the image.

services:
  playlistmanager:
    environment:
      # Force h264_nvenc — skips the runtime probe which can fail if the
      # NVIDIA kernel module hasn't fully initialised before the first
      # Pluto session starts.  Remove this line to re-enable auto-detection.
      PLUTO_X11_ENCODER: h264_nvenc

      # nvenc initialisation adds ~2 s on the first encode.
      PLUTO_X11_STARTUP_WAIT: 15

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
