# docker-compose.nvidia.yml
# NVIDIA GPU (h264_nvenc encoder)
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up -d
#
# Requirements:
#   - NVIDIA GPU with Turing architecture or newer (RTX 20xx / GTX 16xx+)
#   - nvidia-container-toolkit installed on the host
#   - TrueNAS SCALE Goldeye (25.10): GPU passthrough enabled in
#     Apps → Settings, then add `runtime: nvidia` as shown here.
#     Do NOT use the deploy.resources.reservations block — TrueNAS ignores it.
#
# Why jellyfin-ffmpeg is required:
#   Debian bookworm's stock ffmpeg is compiled WITHOUT --enable-nvenc.
#   jellyfin-ffmpeg ships a static build with h264_nvenc/vaapi/qsv baked in.
#   The NVENC runtime libs are injected at container start by
#   nvidia-container-toolkit — no CUDA version is baked into the image.

services:
  playlistmanager:
    # TrueNAS SCALE / standard Docker: use runtime + env vars, NOT deploy.resources
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: video,compute,utility

      # Force h264_nvenc — skips the runtime probe which can race if the
      # NVIDIA kernel module hasn't fully initialised before the first
      # Pluto session starts.  Remove to re-enable auto-detection.
      PLUTO_X11_ENCODER: h264_nvenc

      # nvenc init adds ~2 s on first encode; give Chromium the extra headroom.
      PLUTO_X11_STARTUP_WAIT: 15
