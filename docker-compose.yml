services:
  playlistmanager:
    container_name: playlistmanager
    image: ghcr.io/n3o2345/playlistmanager:latest
    restart: unless-stopped
    ports:
      - '5523:5523'
    volumes:
      - db_data:/data
    environment:
      # ── Embedded tvapp2 daemon ──────────────────────────────────────────────
      # tvapp2 runs internally on localhost:4124. Set TVAPP2_ENABLED=0 to
      # disable it (e.g. if you run tvapp2 as a separate container instead).
      TVAPP2_ENABLED: 1
      TVAPP2_STREAM_QUALITY: hd     # hd | sd
      TVAPP2_LOG_LEVEL: 2           # 0=off … 6=verbose
      # TVAPP2_PORT: 4124           # internal port (no need to expose externally)
    healthcheck:
      test:
        - CMD-SHELL
        - curl -sf http://localhost:5523/health || exit 1
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 5
